name: Study Corner CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "hotfix/**"
      - "docs/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend CI

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci


  frontend:
    name: Frontend CI

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci